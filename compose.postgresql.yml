services:
  postgresql:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${PG_H2_DATABASE:-alta_pg_h2_dev}
      POSTGRES_USER: ${PG_H2_USERNAME:-alta_pg_h2}
      POSTGRES_PASSWORD: ${PG_H2_PASSWORD:?PG_H2_PASSWORD must be set in an ignored local environment file}
      PGDATA: /var/lib/postgresql/18/docker
      PGTZ: UTC
      TZ: UTC
    ports:
      - "127.0.0.1:${PG_H2_HOST_PORT:-55432}:5432"
    volumes:
      - alta_pg_h2_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: "no"

volumes:
  alta_pg_h2_data:
    name: alta_pg_h2_data
